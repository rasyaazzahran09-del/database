name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PUB_CACHE: /home/runner/.pub-cache
      GRADLE_USER_HOME: /home/runner/.gradle
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx2g"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Flutter & Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-3.32.0-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-3.32.0-
            ${{ runner.os }}-flutter-

      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            --connect-timeout 30 \
            --retry 3 \
            --retry-delay 5 \
            -w "\n=== HTTP Status: %{http_code} === Size: %{size_download} bytes ===\n"
          ls -lh project.zip

      - name: Extract ZIP
        run: |
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            cat project.zip
            exit 1
          fi
          echo "✅ ZIP valid"
          unzip -q project.zip -d project_raw

          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "✅ Project dir: $PROJECT_DIR"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: "stable"
          cache: true

      - name: Flutter Doctor (quick check)
        run: flutter doctor -v || true

      - name: Get Dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "=== Running flutter pub get ==="
            flutter pub get --no-precompile 2>&1 | tail -20
          else
            echo "⚠️ pubspec.yaml tidak ditemukan, skip flutter pub get"
          fi

      - name: Analyze Project (quick)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter analyze --no-fatal-infos 2>&1 | tail -30 || true
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: exit 1

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "=== Building Flutter APK (${{ github.event.inputs.build_type }}) ==="
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              flutter build apk --debug --no-tree-shake-icons 2>&1
            else
              flutter build apk --release --no-tree-shake-icons --split-debug-info=./symbols 2>&1
            fi
          else
            echo "=== Building with Gradle ==="
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR" && chmod +x gradlew
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug --parallel --build-cache 2>&1
            else
              ./gradlew assembleRelease --parallel --build-cache 2>&1
            fi
          fi

      - name: Locate APK Output
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" ! -path "*/symbols/*" | head -n 1)
          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            find $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "✅ APK: $APK_PATH ($(du -h "$APK_FOUND" | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
          compression-level: 6
