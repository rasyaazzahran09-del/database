name: Build Native APK (Android Native)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Android Native (Gradle)"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      app_name:
        description: "Nama Aplikasi (opsional, untuk rename APK)"
        required: false
        default: ""
      sign_apk:
        description: "Sign APK dengan keystore? (true/false)"
        required: false
        default: "false"

jobs:
  build-native:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download ZIP Project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip
          echo ""
          echo "=== File Type ==="
          file project.zip

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            cat project.zip
            exit 1
          fi
          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Menentukan Project Dir ==="
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)

          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "✅ Project dir: $PROJECT_DIR"

      - name: Detect Gradle Project
        run: |
          echo "=== Mencari gradlew ==="
          GRADLEW_PATH=$(find ${{ env.PROJECT_DIR }} -name "gradlew" | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ gradlew tidak ditemukan di project!"
            echo "=== Struktur Folder ==="
            find ${{ env.PROJECT_DIR }} -maxdepth 3 | head -50
            exit 1
          fi

          GRADLE_DIR=$(dirname "$GRADLEW_PATH")
          echo "✅ gradlew ditemukan di: $GRADLE_DIR"
          echo "GRADLE_DIR=$GRADLE_DIR" >> $GITHUB_ENV

      - name: Make gradlew Executable
        run: chmod +x ${{ env.GRADLE_DIR }}/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK Native (Debug)
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: ${{ env.GRADLE_DIR }}
        run: |
          echo "=== Building Debug APK ==="
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Build APK Native (Release - Unsigned)
        if: ${{ github.event.inputs.build_type == 'release' && github.event.inputs.sign_apk != 'true' }}
        working-directory: ${{ env.GRADLE_DIR }}
        run: |
          echo "=== Building Release APK (Unsigned) ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -100

      - name: Build APK Native (Release - Signed)
        if: ${{ github.event.inputs.build_type == 'release' && github.event.inputs.sign_apk == 'true' }}
        working-directory: ${{ env.GRADLE_DIR }}
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "=== Decoding Keystore ==="
          echo "$KEYSTORE_B64" | base64 -d > keystore.jks

          echo "=== Building Signed Release APK ==="
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon --stacktrace 2>&1 | tail -100

          rm -f keystore.jks

      - name: Find APK Output
        run: |
          echo "=== Mencari APK ==="
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | grep -v "test" | head -n 1)

          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            echo "=== Semua file di workspace ==="
            find $GITHUB_WORKSPACE -name "*.apk" | head -20
            exit 1
          fi

          echo "✅ APK ditemukan: $APK_FOUND"
          APK_RELATIVE=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")

          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -n "$APP_NAME" ]; then
            SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_-')
            DEST_APK="$SAFE_NAME-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}.apk"
            cp "$APK_FOUND" "$GITHUB_WORKSPACE/$DEST_APK"
            APK_RELATIVE="$DEST_APK"
          fi

          echo "APK_RELATIVE=$APK_RELATIVE" >> $GITHUB_ENV
          echo "APK_PATH=$GITHUB_WORKSPACE/$APK_RELATIVE" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
